publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  http: ^1.3.0
  flutter_dotenv: ^5.2.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  fl_chart: ^0.70.2
